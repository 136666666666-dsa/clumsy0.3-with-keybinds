name: Build clumsy.exe

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 安装 Zig 0.9.1
        uses: mlugg/setup-zig@v1
        with:
          version: 0.9.1

      # 👇 这一步直接修复源码里的死路径！！！
      - name: 永久修复 Windows Kit 路径错误
        run: |
          (Get-Content build.zig) -replace 'C:\\Program Files \(x86\)\\Windows Kits\\10\\bin\\10.0.19041.0', 'C:\Program Files (x86)\Windows Kits\10\bin\x64' | Set-Content build.zig

      - name: 编译 64位 Release
        run: zig build -Dtarget=x86_64-windows -Drelease-fast

      - name: 上传成品
        uses: actions/upload-artifact@v4
        with:
          name: clumsy-win64-exe
          path: zig-out/bin/clumsy.exe
