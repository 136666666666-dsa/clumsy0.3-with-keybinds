name: Build Clumsy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3
    - name: Setup Visual Studio
      uses: microsoft/setup-msbuild@v1.1
    - name: Build solution
      run: msbuild Clumsy.sln /p:Configuration=Release
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: Clumsy-release
        path: '**/Release/*.exe'
