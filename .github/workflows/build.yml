name: Build clumsy.exe

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest  # 用最新版，不用排队！
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 安装 Zig 0.9.1
        uses: mlugg/setup-zig@v1
        with:
          version: 0.9.1

      # 👇 修复 Windows Kit 路径错误（核心！）
      - name: 修复 Windows SDK 路径
        run: |
          echo "WINDOWS_KIT_BIN_ROOT=C:\Program Files (x86)\Windows Kits\10\bin\10.0.19041.0\x64" >> $env:GITHUB_ENV

      # 👇 正确编译命令
      - name: 编译 64位 Release
        run: zig build -Dtarget=x86_64-windows -Drelease-fast

      - name: 上传 exe
        uses: actions/upload-artifact@v4
        with:
          name: clumsy-win64-exe
          path: zig-out/bin/clumsy.exe
