name: Build clumsy.exe

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: 拉取源码
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: 安装 Zig 0.9.1
        uses: mlugg/setup-zig@v1
        with:
          version: 0.9.1

      - name: 编译 64位 Release
        run: zig build -Dtarget=x86_64-windows -Drelease-fast

      - name: 上传exe制品
        uses: actions/upload-artifact@v4  # 这里修复了！
        with:
          name: clumsy-win64-exe
          path: zig-out/bin/clumsy.exe
