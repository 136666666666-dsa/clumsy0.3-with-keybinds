name: Build Clumsy EXE

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. 检出源码
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. 设置 MSBuild
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1

      # 3. 编译 Clumsy
      - name: Build Clumsy Release x64
        run: |
          echo "Compiling Clumsy..."
          msbuild Clumsy.sln /p:Configuration=Release /p:Platform=x64 /m
          echo "Build completed."

      # 4. 打包可执行文件和依赖
      - name: Prepare ZIP package
        run: |
          mkdir package
          # 复制 exe
          copy path\to\Release\Clumsy.exe package\
          # 如果有 DLL（WinPcap/Npcap），可以复制
          if exist "C:\Windows\System32\wpcap.dll" copy "C:\Windows\System32\wpcap.dll" package\
          if exist "C:\Windows\System32\packet.dll" copy "C:\Windows\System32\packet.dll" package\
          # 打包成 ZIP
          powershell Compress-Archive -Path package\* -DestinationPath clumsy-release.zip

      # 5. 上传产物
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: clumsy-release
          path: clumsy-release.zip
