name: Build clumsy.exe

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-2019  # 关键：必须用旧版Windows环境
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 安装 Zig 0.9.1
        uses: mlugg/setup-zig@v1
        with:
          version: 0.9.1

      - name: 编译 64位 Release
        run: zig build release -Dtarget=x86_64-windows  # 修复命令

      - name: 上传成品
        uses: actions/upload-artifact@v4
        with:
          name: clumsy-win64-exe
          path: zig-out/bin/clumsy.exe
