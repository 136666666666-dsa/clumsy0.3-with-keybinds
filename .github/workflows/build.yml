name: Build clumsy.exe

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: 拉取源码
        uses: actions/checkout@v4
        with:
          submodules: true  # 必须拉子模块
          fetch-depth: 0

      # 👇 修复：正确安装 Zig 0.9.1
      - name: 安装 Zig 0.9.1
        uses: mlugg/setup-zig@v1
        with:
          version: 0.9.1

      # 👇 修复：必须先更新子模块！很多人卡在这里
      - name: 更新子模块
        run: git submodule update --init --recursive

      # 👇 修复：clumsy 官方正确编译命令
      - name: 编译 64 位 Release
        run: zig build -Dtarget=x86_64-windows -Drelease-fast

      - name: 查看生成文件
        run: dir .\zig-out\bin

      - name: 上传制品
        uses: upload-artifact@v4
        with:
          name: clumsy-win64-exe
          path: zig-out/bin/clumsy.exe
