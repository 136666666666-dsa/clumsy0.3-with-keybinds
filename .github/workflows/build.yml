name: Build clumsy.exe

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      # 1. 检出代码
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2. 设置 MSBuild（Visual Studio 编译环境）
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1

      # 3. 编译 Clumsy
      - name: Build Clumsy Release x64
        run: |
          echo "Building Clumsy..."
          # 如果 Clumsy.sln 在仓库根目录，直接写 Clumsy.sln
          msbuild Clumsy.sln /p:Configuration=Release /p:Platform=x64 /m
          echo "Build finished."
          # 查看生成的文件夹内容确认 exe
          dir Clumsy\x64\Release

      # 4. 打包 exe
      - name: Prepare package
        run: |
          mkdir package
          # 修改路径到实际生成的 exe
          copy Clumsy\x64\Release\Clumsy.exe package\
          dir package

      # 5. 压缩成 zip
      - name: Compress package
        run: |
          powershell Compress-Archive -Path package\* -DestinationPath clumsy-release.zip
          dir  # 查看 zip 文件

      # 6. 上传产物
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: clumsy-win64
          path: clumsy-release.zip
