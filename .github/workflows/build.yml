name: Build Clumsy.exe

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      # 1. 检出代码
      - uses: actions/checkout@v4

      # 2. 设置 MSBuild / cl 编译环境
      - name: Setup MSBuild Tools
        uses: microsoft/setup-msbuild@v1.1

      # 3. 创建输出目录
      - name: Create build directory
        shell: cmd
        run: |
          mkdir build

      # 4. 编译 C 源码生成 Clumsy.exe
      - name: Compile Clumsy.exe
        shell: cmd
        run: |
          echo Compiling Clumsy C files...
          rem 编译 src 目录下所有 .c 文件，生成 build\Clumsy.exe
          cl /Fe:build\Clumsy.exe src\*.c
          if not exist build\Clumsy.exe (
            echo ERROR: Clumsy.exe was not created!
            exit 1
          )
          dir build

      # 5. 打包 exe
      - name: Prepare package
        shell: cmd
        run: |
          mkdir package
          copy build\Clumsy.exe package\
          dir package

      # 6. 压缩成 zip
      - name: Compress package
        shell: powershell
        run: |
          Compress-Archive -Path package\* -DestinationPath clumsy-release.zip
          if (-not (Test-Path clumsy-release.zip)) {
            Write-Error "ERROR: clumsy-release.zip not created!"
            exit 1
          }
          Get-ChildItem

      # 7. 上传 artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: clumsy-win64
          path: clumsy-release.zip
