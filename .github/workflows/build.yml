name: Build clumsy.exe

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      # 1. 检出代码
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2. 安装 MSBuild 工具（csc 编译器）
      - name: Setup MSBuild Tools
        uses: microsoft/setup-msbuild@v1.1

      # 3. 设置源码目录变量
      - name: Set source directory
        run: echo "SRC_DIR=." >> $GITHUB_ENV  # 根目录，可改为子目录

      # 4. 列出所有 C# 文件，确认存在
      - name: List all C# files
        shell: cmd
        run: |
          echo Listing all .cs files in %SRC_DIR%
          dir /s %SRC_DIR%\*.cs
          if errorlevel 1 exit 1

      # 5. 编译所有 C# 源码文件
      - name: Compile Clumsy.exe
        shell: cmd
        run: |
          echo Compiling Clumsy...
          mkdir build
          rem 编译所有 .cs 文件
          csc /target:exe /out:build\Clumsy.exe %SRC_DIR%\**\*.cs
          if not exist build\Clumsy.exe (
            echo ERROR: Clumsy.exe was not created!
            exit 1
          )
          dir build

      # 6. 打包 exe
      - name: Prepare package
        shell: cmd
        run: |
          mkdir package
          copy build\Clumsy.exe package\
          dir package

      # 7. 压缩成 zip
      - name: Compress package
        shell: powershell
        run: |
          Compress-Archive -Path package\* -DestinationPath clumsy-release.zip
          if (-not (Test-Path clumsy-release.zip)) {
            Write-Error "ERROR: clumsy-release.zip not created!"
            exit 1
          }
          Get-ChildItem

      # 8. 上传产物
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: clumsy-win64
          path: clumsy-release.zip
