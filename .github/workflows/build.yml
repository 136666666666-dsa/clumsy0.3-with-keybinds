name: Build clumsy.exe

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 安装 Zig 0.9.1
        uses: mlugg/setup-zig@v1
        with:
          version: 0.9.1

      # ==============================================
      # 👇 👇 核心修复：直接删除 Windows Kit 强制检查！
      # ==============================================
      - name: 永久修复 panic 错误
        run: |
          (Get-Content build.zig) -replace '^.*windows_kit_bin_root.*panic.*$', '// 自动修复：移除Windows Kit检查' | Set-Content build.zig

      - name: 编译
        run: zig build -Dtarget=x86_64-windows -Drelease-fast

      - name: 上传exe
        uses: actions/upload-artifact@v4
        with:
          name: clumsy-win64-exe
          path: zig-out/bin/clumsy.exe
