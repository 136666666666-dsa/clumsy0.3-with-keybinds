name: Build clumsy.exe

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      # 1. 检出代码
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2. 安装 .NET Framework 编译器 csc
      - name: Setup MSBuild Tools
        uses: microsoft/setup-msbuild@v1.1

      # 3. 编译所有 C# 源码文件
      - name: Compile Clumsy.exe
        run: |
          echo "Compiling Clumsy..."
          mkdir build
          # 假设所有 .cs 文件都在根目录或子目录 Clumsy/
          # /target:exe 生成可执行文件
          # /out:build\Clumsy.exe 输出到 build 文件夹
          dir /s *.cs
          csc /target:exe /out:build\Clumsy.exe **\*.cs
          echo "Compilation finished."
          dir build

      # 4. 打包 exe
      - name: Prepare package
        run: |
          mkdir package
          copy build\Clumsy.exe package\
          dir package

      # 5. 压缩成 zip
      - name: Compress package
        run: |
          powershell Compress-Archive -Path package\* -DestinationPath clumsy-release.zip
          dir

      # 6. 上传产物
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: clumsy-win64
          path: clumsy-release.zip
